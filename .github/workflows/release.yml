name: Release

on:
  push:
    tags:
      - "v*"

# Minimal permissions — only grant what's needed.
permissions:
  contents: write   # create GitHub releases & upload assets
  id-token: write   # OIDC token for keyless cosign signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Pin all actions to full commit SHAs to prevent supply-chain attacks.

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Install cosign
        uses: sigstore/cosign-installer@3454372be43b8f1b73e0f568090b7e1b21e93816 # v3.8.2

      - name: Install syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.GO_RELEASER_GITHUB_TOKEN }}
