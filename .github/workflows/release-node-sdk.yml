---
name: Release Agent Vault Node SDK
run-name: Release Agent Vault Node SDK

on:
    push:
        tags:
            - "node-sdk/v*.*.*" # version, e.g. 1.0.0

permissions:
  contents: write
  id-token: write  # Required for NPM OIDC auth for releases

defaults:
  run:
    working-directory: "./sdks/sdk-typescript"

jobs:
    npm:
        name: Publish NPM
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repo
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                node-version: '24.14.0'
                cache: "npm"
                cache-dependency-path: "sdks/sdk-typescript/package-lock.json"
                registry-url: "https://registry.npmjs.org"

            - name: Install dependencies
              run: npm ci

            - name: Set NPM version
              run: npm version ${GITHUB_REF_NAME#node-sdk/v} --allow-same-version --no-git-tag-version

            - name: Publish NPM
              run: npm publish --access public --provenance
